{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JoeLinkAI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --ink:        #0a0a0a;
      --ink-2:      #1a1a1a;
      --paper:      #f5f5f5;
      --surface:    #ffffff;
      --surface-2:  #f0f0f0;
      --border:     #e0e0e0;
      --border-2:   #c8c8c8;
      --muted:      #737373;
      --muted-lt:   #9a9a9a;
      --success:    #16a34a;
      --danger:     #dc2626;
      --warning:    #d97706;
      --nav-h:      64px;
      --radius:     8px;
      --radius-lg:  12px;
      --t:          .15s ease;
      --shadow-sm:  0 1px 4px rgba(0,0,0,.06), 0 2px 8px rgba(0,0,0,.04);
      --shadow-md:  0 4px 16px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.05);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Figtree', sans-serif;
      background: var(--paper);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
    }
    h1, h2, h3, h4 {
      font-family: 'Syne', sans-serif;
      line-height: 1.12;
      letter-spacing: -.03em;
    }
    a { color: inherit; }

    /* ── NAV ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      height: var(--nav-h);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center;
      padding: 0 2rem;
      gap: 2rem;
    }
    .nav-brand {
      font-family: 'Syne', sans-serif;
      font-weight: 800; font-size: 1.2rem;
      color: var(--ink); text-decoration: none;
      letter-spacing: -.04em;
      display: flex; align-items: center; gap: .5rem;
    }
    .nav-brand .logo-icon {
      width: 28px; height: 28px;
      background: #1a6ef5;
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .nav-brand .logo-icon svg { color: #fff; }
    .nav-brand { color: #1a6ef5; }
    .nav-brand .muted { color: #1458cc; }
    .nav-links { display: flex; gap: 1.75rem; margin-left: auto; align-items: center; }
    .nav-links a {
      color: var(--muted); text-decoration: none;
      font-size: .875rem; font-weight: 500;
      transition: color var(--t);
    }
    .nav-links a:hover { color: var(--ink); }

    /* ── BUTTONS ── */
    .btn {
      display: inline-block;
      padding: .55rem 1.35rem;
      border-radius: var(--radius);
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: .875rem;
      text-decoration: none; cursor: pointer;
      border: 1.5px solid transparent;
      transition: all var(--t);
      line-height: 1.4;
    }
    .btn-primary {
      background: var(--ink); color: var(--surface);
      border-color: var(--ink);
    }
    .btn-primary:hover { background: var(--ink-2); border-color: var(--ink-2); color: #fff; }
    .btn-outline {
      background: transparent; color: var(--ink);
      border-color: var(--border-2);
    }
    .btn-outline:hover { border-color: var(--ink); background: var(--ink); color: var(--surface); }
    .btn-lg { padding: .8rem 2rem; font-size: .95rem; }

    /* ── FOOTER ── */
    footer {
      border-top: 1px solid var(--border);
      padding: 2rem;
      text-align: center;
      font-size: .82rem;
      color: var(--muted);
    }
    footer a { color: var(--muted); text-decoration: none; transition: color var(--t); }
    footer a:hover { color: var(--ink); }

    /* ── FORMS ── */
    .form-group { margin-bottom: 1.25rem; }
    label { display: block; font-weight: 600; font-size: .84rem; margin-bottom: .35rem; color: var(--ink-2); }
    input[type=text], input[type=email], input[type=date], input[type=number],
    select, textarea {
      width: 100%;
      padding: .6rem .85rem;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      font-family: 'Figtree', sans-serif;
      font-size: .9rem;
      color: var(--ink);
      transition: border-color var(--t);
    }
    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--ink-2);
    }
    textarea { resize: vertical; min-height: 120px; }
    .errorlist {
      list-style: none; color: var(--danger);
      font-size: .8rem; margin-top: .3rem;
    }
    .form-check { display: flex; align-items: center; gap: .6rem; }
    .form-check input[type=checkbox] { width: auto; }
    fieldset {
      border: 1.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    legend {
      font-family: 'Syne', sans-serif;
      font-weight: 700; font-size: .78rem;
      padding: 0 .5rem; color: var(--muted);
      letter-spacing: .06em; text-transform: uppercase;
    }

    /* ── ALERTS ── */
    .alert {
      padding: .85rem 1.25rem;
      border-radius: var(--radius);
      margin-bottom: 1.5rem;
      font-size: .88rem;
    }
    .alert-success { background: rgba(22,163,74,.06); border: 1px solid rgba(22,163,74,.25); color: var(--success); }
    .alert-danger  { background: rgba(220,38,38,.06); border: 1px solid rgba(220,38,38,.25); color: var(--danger); }

    /* ── CONTAINER ── */
    .container    { max-width: 1100px; margin: 0 auto; padding: 0 1.5rem; }
    .container-sm { max-width: 680px;  margin: 0 auto; padding: 0 1.5rem; }
  </style>
  {% block extra_head %}{% endblock %}
</head>
<body>

<nav>
  <a class="nav-brand" href="{% url 'website:home' %}">
    <span class="logo-icon">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    </span>
    JoeLink<span class="muted">AI</span>
  </a>
  <div class="nav-links">
    <a href="{% url 'website:plans' %}">Plans</a>
    <a href="{% url 'website:download' %}">Download</a>
    <a href="{% url 'website:contact' %}">Contact</a>
    <a class="btn btn-primary" href="{% url 'website:create_organization' %}">Get Started</a>
  </div>
</nav>

{% block content %}{% endblock %}

<footer>
  <p>&copy; 2025 JoeLinkAI. All rights reserved. &nbsp;·&nbsp;
    <a href="{% url 'website:contact' %}">Contact</a>
  </p>
</footer>

</body>
</html>
