<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}JoeLinkAI{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Figtree:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:           #f5f5f5;
      --surface:      #ffffff;
      --surface-2:    #fafafa;
      --border:       #e5e5e5;
      --border-hover: #c0c0c0;
      --ink:          #0a0a0a;
      --ink-2:        #1a1a1a;
      --muted:        #737373;
      --danger:       #dc2626;
      --warning:      #d97706;
      --radius-sm:    6px;
      --radius-md:    9px;
      --radius-lg:    14px;
      --t:            .14s ease;
      --font-head:    'Syne', sans-serif;
      --font-body:    'Figtree', sans-serif;
    }
    [data-theme="dark"] {
      --bg:           #0a0a0a;
      --surface:      #111111;
      --surface-2:    #161616;
      --border:       #222222;
      --border-hover: #3a3a3a;
      --ink:          #f0f0f0;
      --ink-2:        #d4d4d4;
      --muted:        #737373;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--ink);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      transition: background var(--t), color var(--t);
    }

    .page-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 420px;
      text-align: center;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-bottom: 2rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .brand-icon {
      width: 32px; height: 32px;
      background: #1a6ef5;
      border-radius: var(--radius-sm);
      display: flex; align-items: center; justify-content: center;
      color: #fff;
      flex-shrink: 0;
    }
    .brand-name {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -.03em;
      color: #1a6ef5;
    }
    .brand-name span { color: #1458cc; }

    .page-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.25rem;
      border: 1px solid var(--border);
      background: var(--surface-2);
      color: var(--muted);
    }

    .page-code {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 3rem;
      letter-spacing: -.05em;
      color: var(--ink);
      line-height: 1;
      margin-bottom: .5rem;
    }

    .page-title {
      font-family: var(--font-head);
      font-weight: 700;
      font-size: 1.05rem;
      color: var(--ink);
      margin-bottom: .5rem;
    }

    .page-desc {
      font-size: .84rem;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: .65rem 1.25rem;
      border-radius: var(--radius-sm);
      font-size: .72rem;
      font-weight: 700;
      font-family: var(--font-head);
      letter-spacing: .08em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: opacity var(--t), transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn-primary { background: var(--ink); color: var(--surface); }
    .btn-primary:hover { opacity: .82; }
    .btn-secondary {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .btn-secondary:hover { border-color: var(--border-hover); color: var(--ink); }

    .btn-row {
      display: flex;
      gap: 8px;
      justify-content: center;
      flex-wrap: wrap;
    }

    /* Theme toggle */
    .theme-toggle {
      position: fixed;
      top: 1.25rem; right: 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: .5rem .55rem;
      cursor: pointer;
      color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: all var(--t);
    }
    .theme-toggle:hover { border-color: var(--border-hover); color: var(--ink); }
  </style>
  {% block extra_style %}{% endblock %}
</head>
<body>

  <button class="theme-toggle" id="themeBtn" aria-label="Toggle theme">
    <svg id="themeIcon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  {% block content %}{% endblock %}

  <script>
    (function(){
      var html = document.documentElement;
      var btn  = document.getElementById('themeBtn');
      var icon = document.getElementById('themeIcon');
      var MOON = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
      var SUN  = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
      function apply(t){ html.setAttribute('data-theme',t); localStorage.setItem('jla-theme',t); if(icon) icon.innerHTML=(t==='dark')?MOON:SUN; }
      apply(localStorage.getItem('jla-theme')||'light');
      if(btn) btn.addEventListener('click',function(){ apply(html.getAttribute('data-theme')==='dark'?'light':'dark'); });
    })();
  </script>
  {% block extra_script %}{% endblock %}
</body>
</html>
